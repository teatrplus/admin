# ---------------------------------------------------------------------------
# Admin + PocketBase API — admin.teatrplus.uz
# Serves pb_public (Svelte UI) and proxies /api/, /_/, realtime, storage.
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name admin.theaterplus.uz;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name admin.theaterplus.uz;
    http2 on;

    ssl_certificate /etc/letsencrypt/live/admin.theaterplus.uz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/admin.theaterplus.uz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot    
    ssl_session_cache shared:TeatrPlusSSL:10m;

    # Landing uploads + admin media drops
    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # PocketBase realtime (SSE / long-lived connections)
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
